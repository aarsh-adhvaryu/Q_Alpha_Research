name: Hedge paper daily
on:
  schedule:
    - cron: "31 12 * * 1-5" # off-hour weekday (GitHub drops on-the-hour schedules under load)
  workflow_dispatch: {} # allow a manual run from the Actions tab
permissions:
  contents: write # to commit the refreshed panel + track record
jobs:
  hedge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Install deps
        run: uv sync --extra dev --extra dashboard --extra ai
      - name: Refresh panel + recompute the forward hedge paper run (trades nothing)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scripts/hedge_paper.py daily
      - name: Daily AI market brief (context-only narrative; fail-soft, never blocks)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scripts/ai_brief.py daily
      - name: Whole-system health check (heartbeat in the log; never blocks)
        continue-on-error: true # a health report must never red the cron — fail-soft like the rest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scripts/system_check.py --offline
      - name: Commit the track record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fragility_panel.csv data/hedge_paper_track.csv data/hedge_alert_state.json reports/hedge_paper_dashboard.md reports/ai_brief.md
          git diff --staged --quiet || git commit -m "hedge paper: daily mark $(date -u +%F) [skip ci]"
          git push
      - name: Alert on pipeline failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >-
          uv run python scripts/hedge_paper.py pipeline-failed
          "Hedge paper daily job failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
